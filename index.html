<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Berlin — Nico's 30 🎉</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0E0E10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BLN30">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --acid:#CCFF00; --acid-dim:rgba(204,255,0,.28);
  --u-blue:#1466B0;
  --glass: rgba(26,26,30,.60); --glass-brd: rgba(255,255,255,.09);
  --text:#F3F3EF; --muted:#9C9CA3;
  --radius:22px;
  --overlay-c1: transparent; --overlay-c2: transparent; --overlay-op: 0;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; height:100%; overflow:hidden; background:#111;}
body{font-family:'Space Grotesk',-apple-system,BlinkMacSystemFont,sans-serif; color:var(--text);}
button{font-family:inherit; border:none; background:none; color:inherit; cursor:pointer;}
img{-webkit-user-drag:none;}

/* ============ MAP ============ */
#mapWrap{ position:fixed; inset:0; }
#map{ width:100%; height:100%; background:#1c1c20; }
#skyOverlay{
  position:fixed; inset:0; pointer-events:none; z-index:3;
  background: linear-gradient(180deg, var(--overlay-c1) 0%, var(--overlay-c2) 100%);
  opacity: var(--overlay-op);
  mix-blend-mode: multiply;
  transition: background .25s linear, opacity .25s linear;
}
html.night #skyOverlay{ mix-blend-mode: normal; }

/* sun/moon arc */
#arcWrap{ position:fixed; top:0; left:0; right:0; height:130px; z-index:29; pointer-events:none; }
#arcSvg{ width:100%; height:100%; overflow:visible; }
#arcPath{ fill:none; stroke:rgba(255,255,255,.12); stroke-width:1.5; stroke-dasharray:2 6; }
#sunDot{ font-size:20px; filter:drop-shadow(0 2px 6px rgba(0,0,0,.4)); transition: filter .3s; }

/* ============ EMOJI PIN ============ */
.pin{ position:absolute; transform:translate(-50%,-100%); z-index:6; cursor:pointer; display:flex; flex-direction:column; align-items:center; }
.pin-bubble{
  width:42px; height:42px; border-radius:50%;
  background:var(--glass); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  border:1.5px solid var(--glass-brd);
  display:flex; align-items:center; justify-content:center; font-size:20px;
  box-shadow:0 6px 20px rgba(0,0,0,.35); position:relative;
  animation: floaty 3.4s ease-in-out infinite;
  transition: opacity .5s ease, transform .3s;
}
@keyframes floaty{ 0%,100%{ transform:translateY(0) rotate(0deg);} 50%{ transform:translateY(-5px) rotate(-3deg);} }
.pin[data-fi="1"] .pin-bubble{ animation-delay:-.4s; }
.pin[data-fi="2"] .pin-bubble{ animation-delay:-1.1s; }
.pin[data-fi="0"] .pin-bubble{ animation-delay:-2s; }
.pin[data-fi="3"] .pin-bubble{ animation-delay:-2.6s; }
.pin.dim .pin-bubble{ opacity:.16; transform:scale(.82) !important; animation:none; pointer-events:none; }
.pin.hotel .pin-bubble{ border-color:var(--acid); box-shadow:0 0 0 3px var(--acid-dim), 0 6px 20px rgba(0,0,0,.35); }
.pin.primary .pin-bubble{ border-style:solid; }
.pin.option .pin-bubble{ opacity:.72; border-style:dashed; width:34px; height:34px; font-size:16px; }
.pin-num{
  position:absolute; top:-6px; right:-6px; width:19px; height:19px; border-radius:50%;
  background:var(--acid); color:#0B0B0D; font-size:10.5px; font-weight:800;
  display:flex; align-items:center; justify-content:center;
}
.pin-tip{ width:2px; height:7px; background:var(--glass-brd); margin-top:-1px; }
.pin.active .pin-bubble{ border-color:var(--acid); box-shadow:0 0 0 4px var(--acid-dim), 0 6px 24px rgba(0,0,0,.4); animation:pulse 1.8s ease-in-out infinite; }
@keyframes pulse{ 0%,100%{ box-shadow:0 0 0 4px var(--acid-dim), 0 6px 24px rgba(0,0,0,.4);} 50%{ box-shadow:0 0 0 9px transparent, 0 6px 24px rgba(0,0,0,.4);} }
.pin.tapping .pin-bubble{ animation: tapBounce .35s cubic-bezier(.34,1.56,.64,1) !important; }
@keyframes tapBounce{ 0%{transform:scale(1);} 40%{transform:scale(.8);} 100%{transform:scale(1);} }

/* leg badge on day-route */
.leg-badge{
  position:absolute; transform:translate(-50%,-50%); z-index:5; display:flex; align-items:center; gap:5px;
  background:var(--glass); backdrop-filter:blur(14px); border:1px solid var(--glass-brd); border-radius:999px;
  padding:5px 10px 5px 6px; font-size:11px; font-weight:700; box-shadow:0 4px 16px rgba(0,0,0,.35);
  opacity:0; animation: legIn .35s ease forwards;
}
@keyframes legIn{ from{opacity:0; transform:translate(-50%,-50%) scale(.6);} to{opacity:1; transform:translate(-50%,-50%) scale(1);} }
.ampelmann{ width:16px; height:16px; }
.u-roundel{ width:16px; height:16px; border-radius:50%; background:var(--u-blue); color:#fff; font-size:10px; font-weight:800; display:flex; align-items:center; justify-content:center; border:1.5px solid #fff; }

/* ============ TOPBAR ============ */
#topbar{ position:fixed; top:0; left:0; right:0; z-index:30; padding:calc(env(safe-area-inset-top,0) + 12px) 14px 0; pointer-events:none; }
#topbar > *{ pointer-events:auto; }
.row{ display:flex; gap:8px; align-items:center; margin-bottom:9px; }
.glass{ background:var(--glass); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); border:1px solid var(--glass-brd); box-shadow:0 8px 28px rgba(0,0,0,.28); }
.pill{ border-radius:999px; }
.title{ flex:1; padding:11px 16px; font-weight:700; font-size:14px; display:flex; align-items:center; gap:8px; }
.title .dot{ width:7px; height:7px; border-radius:50%; background:var(--acid); box-shadow:0 0 8px var(--acid); flex-shrink:0; }
.iconbtn{ width:41px; height:41px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
.chips{ display:flex; gap:7px; overflow-x:auto; scrollbar-width:none; }
.chips::-webkit-scrollbar{display:none;}
.chip{ padding:8px 14px; border-radius:999px; font-size:12.5px; font-weight:600; color:var(--muted); white-space:nowrap; }
.chip.active{ background:var(--acid); color:#0B0B0D; box-shadow:0 0 14px var(--acid-dim); }
.chip:not(.active){ background:var(--glass); backdrop-filter:blur(14px); border:1px solid var(--glass-brd); }

/* ============ SUN SLIDER PANEL ============ */
#sunPanel{
  max-height:0; overflow:hidden; opacity:0;
  transition: max-height .35s ease, opacity .3s ease, margin .35s ease;
  margin-bottom:0;
}
#sunPanel.open{ max-height:110px; opacity:1; margin-bottom:9px; }
.sun-card{ padding:14px 16px 12px; }
.sun-head{ display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:8px; font-weight:600; }
.sun-head b{ color:var(--text); font-size:13px; }
input#sunSlider{
  -webkit-appearance:none; width:100%; height:5px; border-radius:5px;
  background:linear-gradient(90deg,#2b3a55,#e08a3c,#a83c6e,#1a1a2e); outline:none;
}
input#sunSlider::-webkit-slider-thumb{
  -webkit-appearance:none; width:22px; height:22px; border-radius:50%;
  background:#fff; border:3px solid var(--acid); box-shadow:0 2px 8px rgba(0,0,0,.4); cursor:pointer;
}
.sun-reset{ font-size:11px; color:var(--muted); text-align:center; margin-top:4px; }

/* ============ ROUTE FAB (bottom-left) ============ */
#routeFab{
  position:fixed; left:16px; bottom:calc(env(safe-area-inset-bottom,0) + 20px); z-index:25;
  width:52px; height:52px; border-radius:50%;
  background:var(--glass); backdrop-filter:blur(18px); border:1.5px solid var(--glass-brd);
  box-shadow:0 8px 26px rgba(0,0,0,.35); display:flex; align-items:center; justify-content:center; font-size:21px;
  transition: all .2s;
}
#routeFab.on{ background:var(--acid); color:#0B0B0D; box-shadow:0 0 22px var(--acid-dim); border-color:var(--acid); }
#routeFab:active{ transform:scale(.92); }

/* ============ BOTTOM SHEET ============ */
#backdrop{ position:fixed; inset:0; background:rgba(0,0,0,.4); opacity:0; pointer-events:none; z-index:40; transition:opacity .3s; }
#backdrop.show{ opacity:1; pointer-events:auto; }
#sheet{
  position:fixed; left:0; right:0; bottom:0; z-index:50;
  background:var(--glass); backdrop-filter:blur(28px); -webkit-backdrop-filter:blur(28px);
  border-top:1px solid var(--glass-brd); border-radius:26px 26px 0 0; box-shadow:0 -10px 50px rgba(0,0,0,.4);
  transform:translateY(100%); touch-action:none; padding-bottom:env(safe-area-inset-bottom,0);
}
#sheet.animate{ transition:transform .38s cubic-bezier(.32,.9,.34,1); }
.grab{ width:38px; height:4px; border-radius:4px; background:var(--glass-brd); margin:10px auto 2px; }
.sheet-scroll{ max-height:82vh; overflow-y:auto; padding:6px 20px 24px; }

.peek-row{ display:flex; align-items:center; gap:12px; padding:8px 0 4px; }
.peek-emoji{ font-size:32px; }
.peek-title{ font-weight:800; font-size:18.5px; line-height:1.2; }
.peek-sub{ font-size:12px; color:var(--muted); margin-top:3px; display:flex; gap:9px; align-items:center; flex-wrap:wrap; }
.dots{ display:inline-flex; gap:2px; }
.dots span{ width:5px; height:5px; border-radius:50%; background:var(--glass-brd); }
.dots span.on{ background:var(--acid); }
.expand-hint{ text-align:center; font-size:10.5px; color:var(--muted); margin:2px 0 10px; }

.photos{ display:flex; gap:8px; overflow-x:auto; margin:0 -20px 13px; padding:0 20px; scrollbar-width:none; }
.photos::-webkit-scrollbar{display:none;}
.photo{
  width:124px; height:142px; border-radius:15px; flex-shrink:0; position:relative; overflow:hidden;
  background:linear-gradient(100deg, var(--glass-brd) 8%, rgba(255,255,255,.07) 18%, var(--glass-brd) 33%);
  background-size:200% 100%; animation:shimmer 1.3s ease-in-out infinite;
}
.photo img{ width:100%; height:100%; object-fit:cover; opacity:0; animation:fadeIn .4s ease forwards; }
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
@keyframes fadeIn{to{opacity:1;}}

.info-grid{ display:flex; gap:7px; flex-wrap:wrap; margin-bottom:13px; }
.info-pill{ background:rgba(255,255,255,.06); border:1px solid var(--glass-brd); border-radius:12px; padding:7px 11px; font-size:11.5px; font-weight:600; display:flex; align-items:center; gap:5px; }
.info-pill.status-open{ color:#6FE28A; }
.info-pill.status-closed{ color:#E27E6F; }
.info-pill.addr{ max-width:100%; }

.desc-card{ background:rgba(255,255,255,.05); border-left:3px solid var(--acid); border-radius:0 14px 14px 0; padding:12px 14px; font-size:13.5px; line-height:1.55; margin-bottom:10px; }
.why-card{ background:rgba(204,255,0,.06); border-left:3px solid var(--acid); border-radius:0 14px 14px 0; padding:12px 14px; font-size:13px; line-height:1.5; margin-bottom:14px; color:#E4FFB0; }
.why-card b{ color:var(--acid); }

/* music button (clubs) */
.music-row{ display:flex; align-items:center; gap:10px; background:rgba(255,255,255,.05); border:1px solid var(--glass-brd); border-radius:14px; padding:10px 12px; margin-bottom:14px; }
.music-btn{ width:36px; height:36px; border-radius:50%; background:var(--acid); color:#0B0B0D; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
.music-meta{ flex:1; font-size:12px; }
.music-meta b{ display:block; font-size:12.5px; }
.eq{ display:inline-flex; align-items:flex-end; gap:2px; height:12px; }
.eq span{ width:2.5px; background:var(--acid); border-radius:2px; animation:eq .9s ease-in-out infinite; }
.eq span:nth-child(2){animation-delay:.2s;} .eq span:nth-child(3){animation-delay:.4s;}
@keyframes eq{0%,100%{transform:scaleY(.35);}50%{transform:scaleY(1);}}

/* itinerary block inside sheet */
.itin-card{ background:rgba(255,255,255,.045); border:1px solid var(--glass-brd); border-radius:16px; padding:14px; margin-bottom:14px; }
.itin-head{ display:flex; align-items:center; gap:8px; font-size:13px; font-weight:700; margin-bottom:10px; }
.itin-modes{ display:flex; gap:7px; margin-bottom:4px; }
.mode-btn{ flex:1; padding:10px 6px; border-radius:12px; background:rgba(255,255,255,.05); border:1px solid var(--glass-brd); text-align:center; font-size:11.5px; }
.mode-btn .mi{ font-size:17px; display:block; margin-bottom:3px; }
.mode-btn.active{ background:var(--acid); color:#0B0B0D; border-color:var(--acid); }
.mode-btn.loading{ opacity:.45; }
.itin-cta{ width:100%; padding:12px; border-radius:12px; background:var(--text); color:#0B0B0D; font-weight:700; font-size:13.5px; text-align:center; }
.itin-note{ font-size:11px; color:var(--muted); text-align:center; margin-top:8px; }

.actions{ display:flex; gap:9px; }
.btn{ flex:1; padding:13px; border-radius:14px; font-weight:700; font-size:13.5px; text-align:center; }
.btn-ghost{ background:rgba(255,255,255,.07); border:1px solid var(--glass-brd); }
.btn-reaction{ display:flex; align-items:center; justify-content:center; gap:6px; }

/* reaction picker */
.reactions{ display:flex; gap:8px; margin-bottom:12px; }
.react-btn{ flex:1; padding:9px 0; border-radius:12px; background:rgba(255,255,255,.05); border:1px solid var(--glass-brd); font-size:17px; text-align:center; position:relative; }
.react-count{ position:absolute; top:-5px; right:-2px; background:var(--acid); color:#0B0B0D; font-size:9px; font-weight:800; border-radius:8px; padding:1px 4px; min-width:14px; }

/* toast */
#toast{ position:fixed; left:50%; bottom:100px; transform:translate(-50%,20px); z-index:80; background:var(--text); color:#0B0B0D; padding:11px 18px; border-radius:999px; font-size:12.5px; font-weight:700; opacity:0; transition:all .35s; pointer-events:none; display:flex; align-items:center; gap:6px; max-width:82vw; text-align:center; }
#toast.show{ opacity:1; transform:translate(-50%,0); }

/* ============ KONAMI EASTER EGG ============ */
#eggOverlay{ position:fixed; inset:0; z-index:200; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,.75); backdrop-filter:blur(6px); }
#eggOverlay.show{ display:flex; }
.egg-card{ text-align:center; animation: eggPop .5s cubic-bezier(.34,1.56,.64,1); }
@keyframes eggPop{ from{ transform:scale(.5); opacity:0;} to{ transform:scale(1); opacity:1;} }
.egg-avatar{ width:150px; height:150px; border-radius:50%; background:linear-gradient(135deg,#CCFF00,#8fd400); display:flex; align-items:center; justify-content:center; font-size:70px; position:relative; margin:0 auto 18px; box-shadow:0 0 60px var(--acid-dim); }
.egg-glasses{ position:absolute; top:42%; left:50%; transform:translate(-50%,-50%) rotate(-4deg); width:92px; }
.egg-title{ font-size:22px; font-weight:800; color:#fff; }
.egg-sub{ font-size:13px; color:#c8c8c8; margin-top:4px; }
.confetti{ position:fixed; top:-10px; z-index:210; border-radius:2px; pointer-events:none; }

/* setup screen */
#setup{ position:fixed; inset:0; z-index:900; background:#111; display:none; align-items:center; justify-content:center; padding:24px; }
#setup.show{ display:flex; }
.setup-card{ max-width:440px; background:#1a1a1e; border-radius:22px; padding:26px; color:#eee; }
.setup-card h2{ margin:0 0 8px; font-size:19px; }
.setup-card p{ color:#9c9ca3; font-size:13.5px; line-height:1.55; }
.setup-card code{ background:#26262c; padding:2px 6px; border-radius:6px; font-size:12px; word-break:break-all; }

/* loader */
#loader{ position:fixed; inset:0; z-index:1000; background:#0E0E10; color:#F2F2EE; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:26px; transition:opacity .5s ease; }
#loader.hide{ opacity:0; pointer-events:none; }
.loader-mark{ width:88px; height:88px; border-radius:22px; background:var(--acid); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:26px; color:#0E0E10; animation:pulse2 1.6s ease-in-out infinite; }
@keyframes pulse2{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
.loader-msg{ font-size:14.5px; color:#B9B9B2; min-height:20px; text-align:center; padding:0 32px; }
.loader-bar{ width:130px; height:3px; background:#2A2A2E; border-radius:3px; overflow:hidden; }
.loader-bar::after{ content:''; display:block; height:100%; width:40%; background:var(--acid); border-radius:3px; animation:slide 1.2s ease-in-out infinite; }
@keyframes slide{0%{transform:translateX(-100%);}100%{transform:translateX(350%);}}
</style>
</head>
<body>

<div id="loader">
  <div class="loader-mark">B·30</div>
  <div class="loader-msg" id="loaderMsg">On soudoie le videur du Sisyphos…</div>
  <div class="loader-bar"></div>
</div>

<div id="setup">
  <div class="setup-card">
    <h2>🔑 Il manque la clé Google Maps</h2>
    <p>Colle ta clé dans <code>index.html</code>, à la ligne <code>GOOGLE_MAPS_API_KEY</code>, puis recharge.</p>
  </div>
</div>

<div id="mapWrap"><div id="map"></div></div>
<div id="skyOverlay"></div>
<div id="arcWrap">
  <svg id="arcSvg" viewBox="0 0 400 130" preserveAspectRatio="none">
    <path id="arcPath" d="M 10 110 Q 200 -20 390 110"></path>
  </svg>
</div>

<div id="backdrop"></div>

<div id="topbar">
  <div class="row glass pill" style="padding:5px;">
    <div class="title"><span class="dot"></span><span id="titleText">Vendredi</span></div>
    <button class="iconbtn" id="sunBtn">🌙</button>
  </div>
  <div id="sunPanel" class="glass" style="border-radius:20px;">
    <div class="sun-card">
      <div class="sun-head"><span>Voyager dans la journée</span><b id="sunTime">14:00</b></div>
      <input type="range" id="sunSlider" min="0" max="1440" step="10" value="840">
      <div class="sun-reset">relâche pour revenir à l'heure actuelle</div>
    </div>
  </div>
  <div class="row chips" style="margin-bottom:7px;">
    <button class="chip active" data-mode="prog">📅 Programme</button>
    <button class="chip" data-mode="explo">🔍 Explorer</button>
  </div>
  <div class="chips" id="dayChips">
    <button class="chip active" data-day="ven">Vendredi</button>
    <button class="chip" data-day="sam">Samedi</button>
    <button class="chip" data-day="dim">Dimanche</button>
  </div>
  <div class="chips" id="catChips" style="display:none;">
    <button class="chip active" data-cat="all">Tout</button>
    <button class="chip" data-cat="brunch">🥑 Brunch</button>
    <button class="chip" data-cat="breakfast">🥐 Petit-déj</button>
    <button class="chip" data-cat="patisserie">🧁 Pâtisserie</button>
    <button class="chip" data-cat="cafe">☕️ Café</button>
    <button class="chip" data-cat="restaurant">🍜 Restaurant</button>
    <button class="chip" data-cat="bar">🍸 Bar</button>
    <button class="chip" data-cat="club">🪩 Club</button>
    <button class="chip" data-cat="culture">🖼️ Culture</button>
    <button class="chip" data-cat="shopping">🛍️ Shopping</button>
    <button class="chip" data-cat="sunset">🌅 Sunset</button>
  </div>
</div>

<button id="routeFab">🧭</button>

<div id="sheet">
  <div class="grab" id="grabHandle"></div>
  <div class="sheet-scroll" id="sheetScroll"></div>
</div>

<div id="toast"></div>

<div id="eggOverlay">
  <div class="egg-card">
    <div class="egg-avatar">
      🕺
      <svg class="egg-glasses" viewBox="0 0 100 40" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="10" width="38" height="22" rx="6" fill="#0B0B0D" stroke="#000" stroke-width="1"/>
        <rect x="60" y="10" width="38" height="22" rx="6" fill="#0B0B0D" stroke="#000" stroke-width="1"/>
        <rect x="40" y="18" width="20" height="4" fill="#0B0B0D"/>
        <line x1="0" y1="16" x2="2" y2="16" stroke="#000" stroke-width="2"/>
        <line x1="98" y1="16" x2="100" y2="16" stroke="#000" stroke-width="2"/>
      </svg>
    </div>
    <div class="egg-title">NICO'S DAY 🎉</div>
    <div class="egg-sub">easter egg débloqué — remplace-moi par la vraie photo</div>
  </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
